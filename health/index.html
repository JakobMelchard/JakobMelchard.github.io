<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status — Jakob Melchard</title>
  <meta name="description" content="Site status and uptime for jakob.melchard.org.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://jakob.melchard.org/health">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Status — Jakob Melchard",
    "url": "https://jakob.melchard.org/health",
    "isPartOf": {
      "@type": "WebSite",
      "name": "Jakob Melchard",
      "url": "https://jakob.melchard.org"
    }
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0a0a;
      --bg-dark:      #000000;
      --surface:      rgba(0, 0, 0, 0.4);
      --surface-hover: rgba(0, 0, 0, 0.6);
      --border:       rgba(100, 100, 100, 0.15);
      --border-hover: rgba(139, 233, 253, 0.3);
      --text:         #e0e0e0;
      --muted:        #6272a4;
      --cyan:         #8be9fd;
      --purple:       #bd93f9;
      --pink:         #ff79c6;
      --yellow:       #f1fa8c;
      --green:        #50fa7b;
      --red:          #ff5555;
    }

    body {
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Monaco', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    h1 {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .status-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      width: 480px;
      max-width: 90vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-name {
      font-size: 0.9rem;
      color: var(--text);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--green);
    }

    .status-dot {
      font-size: 0.9rem;
    }

    .last-checked {
      font-size: 0.7rem;
      color: var(--muted);
      width: 480px;
      max-width: 90vw;
      text-align: right;
    }

    .back-link {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <h1>status</h1>
    <div class="status-card">
      <span class="status-name">jakob.melchard.org</span>
      <span class="status-indicator">
        <span class="status-dot">●</span>
        operational
      </span>
    </div>
    <p class="last-checked">last checked <time datetime="2026-03-04">2026-03-04</time></p>
    <a href="/" class="back-link">← back</a>
  </main>
</body>
</html>
