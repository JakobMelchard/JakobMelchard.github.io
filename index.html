<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jakob Melchard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #282a36;
      --bg-dark:      #1e1f29;
      --surface:      rgba(68, 71, 90, 0.3);
      --surface-hover: rgba(68, 71, 90, 0.5);
      --border:       rgba(189, 147, 249, 0.2);
      --text:         #f8f8f2;
      --muted:        #6272a4;
      --cyan:         #8be9fd;
      --purple:       #bd93f9;
      --pink:         #ff79c6;
      --green:        #50fa7b;
      --selected:     rgba(189, 147, 249, 0.2);
    }

    body {
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Monaco', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(189, 147, 249, 0.1) 0%, transparent 50%);
      animation: rotate 20s linear infinite;
      pointer-events: none;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--purple);
      letter-spacing: .15em;
      text-transform: uppercase;
      z-index: 1;
      text-shadow: 0 0 20px rgba(189, 147, 249, 0.5);
    }

    #search-input {
      width: 480px;
      max-width: 90vw;
      background: var(--surface);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: all .3s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      z-index: 1;
    }

    #search-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 8px 32px rgba(139, 233, 253, 0.3);
    }

    #search-input::placeholder {
      color: var(--muted);
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      width: 480px;
      max-width: 90vw;
      min-height: 200px;
      z-index: 1;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      text-decoration: none;
      color: var(--text);
      font-size: .9rem;
      cursor: pointer;
      transition: all .3s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .item:hover {
      background: var(--surface-hover);
      border-color: var(--purple);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(189, 147, 249, 0.3);
    }

    .item.selected {
      background: var(--selected);
      border-color: var(--cyan);
      box-shadow: 0 8px 32px rgba(139, 233, 253, 0.4);
    }

    .item .label {
      font-weight: 600;
      color: var(--pink);
    }

    .item .desc {
      font-size: .75rem;
      color: var(--muted);
    }

    .match {
      color: var(--cyan);
      font-weight: 700;
      text-shadow: 0 0 10px rgba(139, 233, 253, 0.5);
    }
  </style>
</head>
<body>
  <h1>Jakob Melchard</h1>
  <input type="text" id="search-input" placeholder="Type to search..." autocomplete="off" autofocus>
  <div id="results"></div>

  <script>
    const items = [
      { key: 'cv', desc: 'Curriculum Vitae', url: '/cv' },
      { key: 'github', desc: 'GitHub Profile', url: 'https://github.com/JakobMelchard' },
      { key: 'contact', desc: 'Email', url: 'mailto:jakob@melchard.org' },
      { key: 'sh', desc: 'Shell', url: '/sh' },
      { key: 'health', desc: 'Status', url: '/health' },
    ];

    let filtered = items;
    let selectedIdx = 0;

    const input = document.getElementById('search-input');
    const results = document.getElementById('results');

    function fuzzyMatch(str, query) {
      let i = 0, j = 0;
      str = str.toLowerCase();
      query = query.toLowerCase();
      while (i < str.length && j < query.length) {
        if (str[i] === query[j]) j++;
        i++;
      }
      return j === query.length;
    }

    function highlightMatches(str, query) {
      if (!query) return str;
      let result = '';
      let qi = 0;
      query = query.toLowerCase();
      for (let i = 0; i < str.length; i++) {
        if (qi < query.length && str[i].toLowerCase() === query[qi]) {
          result += `<span class="match">${str[i]}</span>`;
          qi++;
        } else {
          result += str[i];
        }
      }
      return result;
    }

    function render() {
      results.innerHTML = filtered.map((item, idx) => {
        const sel = idx === selectedIdx ? ' selected' : '';
        const keyHtml = highlightMatches(item.key, input.value);
        const descHtml = highlightMatches(item.desc, input.value);
        return `<div class="item${sel}" data-idx="${idx}">
          <span class="label">${keyHtml}</span>
          <span class="desc">${descHtml}</span>
        </div>`;
      }).join('');

      // Add click handlers
      document.querySelectorAll('.item').forEach(el => {
        el.addEventListener('click', () => {
          selectedIdx = parseInt(el.dataset.idx);
          navigate();
        });
      });
    }

    function filter() {
      const query = input.value.trim();
      if (!query) {
        filtered = items;
      } else {
        filtered = items.filter(item => 
          fuzzyMatch(item.key, query) || fuzzyMatch(item.desc, query)
        );
      }
      selectedIdx = 0;
      render();
    }

    function navigate() {
      if (filtered.length > 0) {
        window.location.href = filtered[selectedIdx].url;
      }
    }

    input.addEventListener('input', filter);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        navigate();
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIdx = Math.min(filtered.length - 1, selectedIdx + 1);
        render();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIdx = Math.max(0, selectedIdx - 1);
        render();
      }
    });

    render();
  </script>
</body>
</html>
