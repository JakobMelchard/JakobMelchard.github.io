<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jakob Melchard</title>
  <meta name="description" content="Jakob Melchard — software engineer">
  <link rel="canonical" href="https://jakob.melchard.org">
  <meta property="og:title" content="Jakob Melchard">
  <meta property="og:description" content="Software engineer">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jakob.melchard.org">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0a0a;
      --bg-dark:      #000000;
      --surface:      rgba(0, 0, 0, 0.4);
      --surface-hover: rgba(0, 0, 0, 0.6);
      --border:       rgba(100, 100, 100, 0.15);
      --border-hover: rgba(139, 233, 253, 0.3);
      --text:         #e0e0e0;
      --muted:        #6272a4;
      --cyan:         #8be9fd;
      --purple:       #bd93f9;
      --pink:         #ff79c6;
      --yellow:       #f1fa8c;
      --green:        #50fa7b;
      --red:          #ff5555;
      --selected:     rgba(255, 121, 198, 0.12);
      --selected-border: rgba(255, 121, 198, 0.40);
    }

    body {
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Monaco', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(139, 233, 253, 0.03) 0%, transparent 50%);
      animation: rotate 30s linear infinite;
      pointer-events: none;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: .2em;
      text-transform: uppercase;
      z-index: 1;
    }

    #search-input {
      width: 480px;
      max-width: 90vw;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .75rem 1rem;
      color: var(--pink);
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
      z-index: 1;
    }

    #search-input:focus {
      border-color: var(--border-hover);
      background: rgba(0, 0, 0, 0.5);
    }

    #search-input.halo-green {
      box-shadow: 0 0 0 3px rgba(80, 250, 123, 0.4), 0 0 24px rgba(80, 250, 123, 0.25);
      border-color: rgba(80, 250, 123, 0.6);
    }

    #search-input.halo-red {
      box-shadow: 0 0 0 3px rgba(255, 85, 85, 0.4), 0 0 24px rgba(255, 85, 85, 0.25);
      border-color: rgba(255, 85, 85, 0.6);
    }

    #search-input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      width: 480px;
      max-width: 90vw;
      height: 280px;
      z-index: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(139, 233, 253, 0.3) transparent;
    }

    #results::-webkit-scrollbar {
      width: 6px;
    }

    #results::-webkit-scrollbar-track {
      background: transparent;
    }

    #results::-webkit-scrollbar-thumb {
      background: rgba(139, 233, 253, 0.3);
      border-radius: 3px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .75rem 1rem;
      text-decoration: none;
      color: var(--text);
      font-size: .9rem;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
      flex-shrink: 0;
    }

    .item:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .item.selected {
      background: var(--selected);
      border-color: var(--selected-border);
    }

    .item .label {
      font-weight: 500;
      color: var(--text);
    }

    .item .desc {
      font-size: .75rem;
      color: var(--muted);
    }

    .item.selected .label { color: var(--pink); }
    .item.selected .desc  { color: rgba(255, 121, 198, 0.55); }

    .item[data-color="pink"] .label   { color: var(--pink); }
    .item[data-color="purple"] .label { color: var(--purple); }
    .item[data-color="cyan"] .label   { color: var(--cyan); }
    .item[data-color="green"] .label  { color: var(--green); }

    .match {
      color: var(--yellow);
      font-weight: 600;
    }

    /* typing test modal */
    #typing-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(22px) saturate(0.5);
      -webkit-backdrop-filter: blur(22px) saturate(0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.32s ease;
    }

    #typing-modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    #typing-container {
      position: relative;
      width: min(900px, 92vw);
      background: rgba(12,12,12,0.94);
      border: 1px solid rgba(189,147,249,0.14);
      border-radius: 10px;
      padding: 3rem;
      transform: translateY(14px) scale(0.98);
      transition: transform 0.32s cubic-bezier(.2,0,0,1), opacity 0.32s ease;
      opacity: 0;
    }

    #typing-modal.show #typing-container {
      transform: none;
      opacity: 1;
    }

    /* typing test styles */
    #typing-meta {
      margin-bottom: 2.6rem;
      font-size: 0.67rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      font-weight: 300;
      display: flex;
      gap: 1.2rem;
      align-items: center;
    }

    #typing-meta .sep { color: rgba(248,248,242,0.10); }
    #typing-meta-time { color: var(--purple); }

    #typing-live {
      display: flex;
      gap: 2.2rem;
      margin-bottom: 1.3rem;
      font-size: 0.69rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 300;
    }

    .typing-lv {
      display: flex;
      gap: 0.4em;
      align-items: baseline;
    }

    .typing-lv-val { color: rgba(248,248,242,0.52); }
    #typing-live-time { color: var(--cyan); }
    #typing-live-time.urgent {
      color: var(--red);
      animation: tp 0.5s ease infinite alternate;
    }

    @keyframes tp {
      from { opacity: 1; }
      to { opacity: 0.35; }
    }

    #typing-wrap {
      position: relative;
      width: 100%;
    }

    #typing-words {
      font-size: 1.28rem;
      line-height: 2.75rem;
      color: rgba(248,248,242,0.22);
      letter-spacing: 0.025em;
      height: calc(2.75rem * 4);
      overflow: hidden;
      cursor: text;
      user-select: none;
      position: relative;
      transition: filter 0.3s ease, opacity 0.3s ease;
    }

    #typing-words.blurred {
      filter: blur(6px);
      opacity: 0.25;
      pointer-events: none;
    }

    #typing-wi {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      transition: transform 0.14s cubic-bezier(.4,0,.2,1);
    }

    .typing-word {
      display: inline-block;
      margin-right: 0.4em;
      position: relative;
    }

    .typing-letter {
      position: relative;
      display: inline-block;
      transition: color 0.04s;
    }

    .typing-letter.correct { color: var(--cyan); }
    .typing-letter.wrong {
      color: var(--red);
      background: rgba(255,85,85,0.11);
      border-radius: 2px;
    }

    .typing-word.err {
      text-decoration: underline;
      text-decoration-color: rgba(255,85,85,0.35);
      text-underline-offset: 4px;
    }

    .typing-letter.cur::before {
      content: '';
      position: absolute;
      left: -1.5px;
      top: 12%;
      height: 76%;
      width: 2px;
      background: var(--text);
      border-radius: 2px;
      animation: blink 1s step-end infinite;
    }

    .typing-letter.cur-end::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 12%;
      height: 76%;
      width: 2px;
      background: var(--text);
      border-radius: 2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #typing-ghost {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
    }

    #typing-hint {
      margin-top: 1.5rem;
      font-size: 0.61rem;
      letter-spacing: 0.12em;
      color: rgba(248,248,242,0.10);
      display: flex;
      gap: 1.8rem;
    }

    #typing-hint kbd {
      font-family: inherit;
      font-size: 0.58rem;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 0.12rem 0.38rem;
      border-radius: 3px;
      background: rgba(255,255,255,0.025);
    }

    #typing-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.68);
      backdrop-filter: blur(22px) saturate(0.5);
      -webkit-backdrop-filter: blur(22px) saturate(0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.32s ease;
      border-radius: 10px;
    }

    #typing-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    #typing-card {
      background: rgba(12,12,12,0.94);
      border: 1px solid rgba(189,147,249,0.14);
      border-radius: 10px;
      padding: 3.2rem 4.2rem;
      display: flex;
      flex-direction: column;
      gap: 1.9rem;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(189,147,249,0.04);
      transform: translateY(14px) scale(0.98);
      transition: transform 0.32s cubic-bezier(.2,0,0,1), opacity 0.32s ease;
      opacity: 0;
    }

    #typing-overlay.show #typing-card {
      transform: none;
      opacity: 1;
    }

    .typing-wpm-row {
      display: flex;
      align-items: baseline;
      gap: 0.7rem;
    }

    #typing-r-wpm {
      font-size: 5.5rem;
      font-weight: 300;
      line-height: 1;
      color: var(--purple);
      letter-spacing: -0.03em;
    }

    .typing-wpm-lbl {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .typing-stats {
      display: flex;
      gap: 2.8rem;
    }

    .typing-stat big {
      display: block;
      font-size: 1.85rem;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
    }

    .typing-stat big.g { color: var(--green); }
    .typing-stat big.r { color: var(--red); }

    .typing-stat small {
      display: block;
      font-size: 0.61rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-top: 0.3rem;
    }

    .typing-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    .typing-card-footer {
      display: flex;
      align-items: center;
      gap: 1.4rem;
    }

    #typing-r-again {
      background: rgba(189,147,249,0.07);
      border: 1px solid rgba(189,147,249,0.22);
      font-family: inherit;
      font-size: 0.69rem;
      letter-spacing: 0.12em;
      color: var(--purple);
      padding: 0.52rem 1.3rem;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s, border-color 0.15s;
    }

    #typing-r-again:hover {
      background: rgba(189,147,249,0.14);
      border-color: rgba(189,147,249,0.42);
    }

    .typing-card-hint {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* notification toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(80, 250, 123, 0.15);
      border: 1px solid rgba(80, 250, 123, 0.3);
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      color: var(--green);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes screen-shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
      20%, 40%, 60%, 80% { transform: translateX(8px); }
    }

    body.shake {
      animation: screen-shake 0.45s cubic-bezier(.36,.07,.19,.97) both;
    }

    #typing-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 1px solid rgba(255, 85, 85, 0.3);
      color: var(--red);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1;
      padding: 0.18rem 0.52rem;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.15s, background 0.15s;
    }

    #typing-close:hover {
      opacity: 1;
      background: rgba(255, 85, 85, 0.12);
    }

    #typing-r-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 1px solid rgba(255, 85, 85, 0.3);
      color: var(--red);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1;
      padding: 0.18rem 0.52rem;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.15s, background 0.15s;
    }

    #typing-r-close:hover {
      opacity: 1;
      background: rgba(255, 85, 85, 0.12);
    }

    /* responsive: mobile */
    @media (max-width: 600px) {
      #typing-container {
        padding: 1.4rem 1rem;
        border-radius: 8px;
      }

      #typing-words {
        font-size: 1rem;
        line-height: 2.4rem;
        height: calc(2.4rem * 4);
      }

      #typing-card {
        padding: 1.8rem 1.4rem;
      }

      .typing-stats {
        gap: 1.2rem;
        flex-wrap: wrap;
      }

      #typing-r-wpm {
        font-size: 3.8rem;
      }

      #typing-hint {
        gap: 1rem;
        flex-wrap: wrap;
      }
    }

  </style>
</head>
<body>
  <h1>Jakob Melchard</h1>
  <input type="text" id="search-input" placeholder="Type to search..." autocomplete="off" autofocus>
  <div id="results"></div>

  <!-- Toast notification -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- Typing Test Modal -->
  <div id="typing-modal">
    <div id="typing-container">
      <button id="typing-close" title="Close">×</button>
      <div id="typing-meta">
        <span>type</span><span class="sep">·</span>
        <span id="typing-meta-time">15</span>s
      </div>

      <div id="typing-live">
        <div class="typing-lv">wpm <span class="typing-lv-val" id="typing-live-wpm">–</span></div>
        <div class="typing-lv">acc <span class="typing-lv-val" id="typing-live-acc">–</span></div>
        <div class="typing-lv">time <span class="typing-lv-val" id="typing-live-time">15</span></div>
      </div>

      <div id="typing-wrap">
        <div id="typing-words"><div id="typing-wi"></div></div>
        <input id="typing-ghost" type="text" aria-hidden="true" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>

      <div id="typing-hint">
        <span><kbd>tab</kbd> cycle time</span>
        <span><kbd>esc</kbd> close/reset</span>
      </div>

      <div id="typing-overlay">
        <button id="typing-r-close" title="Close">×</button>
        <div id="typing-card">
          <div class="typing-wpm-row">
            <div id="typing-r-wpm">0</div>
            <div class="typing-wpm-lbl">wpm</div>
          </div>
          <div class="typing-stats">
            <div class="typing-stat"><big id="typing-r-raw">0</big><small>raw</small></div>
            <div class="typing-stat"><big id="typing-r-acc">100%</big><small>acc</small></div>
            <div class="typing-stat"><big id="typing-r-chars">0/0</big><small>chars</small></div>
            <div class="typing-stat"><big id="typing-r-time">0s</big><small>time</small></div>
          </div>
          <div class="typing-divider"></div>
          <div class="typing-card-footer">
            <button id="typing-r-again">restart</button>
            <span class="typing-card-hint"><kbd>tab</kbd> next time &nbsp;·&nbsp; <kbd>esc</kbd> close</span>
          </div>
        </div>
      </div>
    </div>
  </div>

      'config','token','cache','queue','event','class','index','array','stack','block',
      'node','tree','list','hash','map','key','port','host','path','base',
      'core','sync','async','fetch','parse','merge','split','sort','filter','reduce',
      'apply','prev','init','load','save','emit','drop','add','remove','reset'
    ];

    const items = [
      { key: 'github',  desc: 'GitHub Profile',   url: 'https://github.com/JakobMelchard',       color: 'cyan'   },
      { key: 'cv',      desc: 'Curriculum Vitae', url: 'https://jakob.melchard.org/cv',          color: 'purple' },
      { key: 'contact', desc: 'Email',            email: 'jakob@melchard.org',                   color: 'pink'   },
      { key: 'health',  desc: 'Status',           url: 'https://jakob.melchard.org/health',      color: 'green'  },
    ];

    let filtered = items;
    let selectedIdx = 0;

    const input          = document.getElementById('search-input');
    const results        = document.getElementById('results');
    const $toast         = /** @type {HTMLDivElement} */ (document.getElementById('toast'));

    function fuzzyMatch(str, query) {
      let i = 0, j = 0;
      str   = str.toLowerCase();
      query = query.toLowerCase();
      while (i < str.length && j < query.length) {
        if (str[i] === query[j]) j++;
        i++;
      }
      return j === query.length;
    }

    function highlightMatches(str, query) {
      if (!query) return str;
      let result = '';
      let qi = 0;
      query = query.toLowerCase();
      for (let i = 0; i < str.length; i++) {
        if (qi < query.length && str[i].toLowerCase() === query[qi]) {
          result += `<span class="match">${str[i]}</span>`;
          qi++;
        } else {
          result += str[i];
        }
      }
      return result;
    }

    function openItem(item) {
      if (item.email) {
        const isTouch = window.matchMedia('(hover: none)').matches;
        if (!isTouch && navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(item.email).then(() => {
            showToast('contact address copied to clipboard');
          }).catch(() => {
            window.location.href = `mailto:${item.email}`;
          });
        } else {
          window.location.href = `mailto:${item.email}`;
        }
      } else if (item.url) {
        window.location.href = item.url;
      }
    }

    function showToast(message) {
      $toast.textContent = message;
      $toast.classList.add('show');
      setTimeout(() => {
        $toast.classList.remove('show');
      }, 2500);
    }

    function flashHalo(color) {
      input.classList.remove('halo-green', 'halo-red');
      input.classList.add(`halo-${color}`);
      setTimeout(() => input.classList.remove(`halo-${color}`), 600);
    }

    function shakeScreen() {
      document.body.classList.remove('shake');
      void document.body.offsetWidth; // force reflow to restart CSS animation
      document.body.classList.add('shake');
      document.body.addEventListener('animationend', () => document.body.classList.remove('shake'), { once: true });
    }

    function render(fromArrow = false) {
      results.innerHTML = filtered.map((item, idx) => {
        const sel      = idx === selectedIdx ? ' selected' : '';
        const keyHtml  = highlightMatches(item.key,  input.value);
        const descHtml = highlightMatches(item.desc, input.value);
        const href = item.url || '#';
        return `<a href="${href}" class="item${sel}" data-idx="${idx}" data-color="${item.color}">
          <span class="label">${keyHtml}</span>
          <span class="desc">${descHtml}</span>
        </a>`;
      }).join('');

      document.querySelectorAll('.item').forEach(el => {
        // pointerdown fires before blur; skip middle-clicks so they can open links in a new tab
        el.addEventListener('pointerdown', (e) => { if (e.button !== 1) e.preventDefault(); });

        el.addEventListener('click', (e) => {
          e.preventDefault();
          selectedIdx = parseInt(el.dataset.idx);
          render();
          openItem(filtered[selectedIdx]);
        });
      });

      // Scroll selected item into view after keyboard navigation
      const sel = results.querySelector('.item.selected');
      if (sel && fromArrow) sel.scrollIntoView({ block: 'nearest' });
    }

    function filter() {
      const query = input.value.trim();
      filtered    = query
        ? items.filter(item => fuzzyMatch(item.key, query) || fuzzyMatch(item.desc, query))
        : items;
      selectedIdx = 0;
      render();
    }

    input.addEventListener('input', filter);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const query = input.value.trim();
        if (query === TRIGGER) { flashHalo('green'); input.value = ''; filter(); openTypingTest(); return; }
        if (filtered.length > 0) { openItem(filtered[selectedIdx]); return; }
        if (query.length > 0) { flashHalo('red'); shakeScreen(); }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIdx = Math.min(filtered.length - 1, selectedIdx + 1);
        render(true);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIdx = Math.max(0, selectedIdx - 1);
        render(true);
      }
    });

    render();

    // ── Typing Test ──────────────────────────────────────────────────────────────

    function rp() {
      let r = Math.random() * PUNCT.reduce((s,[,w])=>s+w,0);
      for(const [p,w] of PUNCT){ r-=w; if(r<=0) return p; }
      return ',';
    }

    function rw() { return WORDS[Math.floor(Math.random()*WORDS.length)]; }
    function rs() { return SYM[Math.floor(Math.random()*SYM.length)]; }

    function genWords(n=110) {
      const out = [];
      for(let i=0;i<n;i++){
        const roll = Math.random();
        let word;
        if(roll < SYM_RATE) {
          word = rs();
        } else if(roll < SYM_PRE) {
          word = rs() + rw();
        } else if(roll < SYM_SUF) {
          word = rw() + rs();
        } else {
          word = rw();
          if(Math.random() < PUNCT_ADD) word += rp();
        }
        if(i>0 && /[.!?]$/.test(out[i-1])) word = word[0].toUpperCase()+word.slice(1);
        out.push(word);
      }
      return out;
    }

    let tidx = 0, DUR = TIMES[0];
    let twords=[], twEls=[], tlEls=[], tcw=0, tcl=0, ttyped='';
    let tstarted=false, tdone=false, tt0=null, ttick=null, ttLeft=DUR;
    let ttotC=0, ttotT=0, tlastRow=0;

    const $tm = document.getElementById('typing-modal');
    const $tw = document.getElementById('typing-words');
    const $twi = document.getElementById('typing-wi');
    const $tg = document.getElementById('typing-ghost');
    const $tov = document.getElementById('typing-overlay');
    const $tlw = document.getElementById('typing-live-wpm');
    const $tla = document.getElementById('typing-live-acc');
    const $tlt = document.getElementById('typing-live-time');
    const $tmt = document.getElementById('typing-meta-time');
    const $trw = document.getElementById('typing-r-wpm');
    const $trr = document.getElementById('typing-r-raw');
    const $tra = document.getElementById('typing-r-acc');
    const $trc = document.getElementById('typing-r-chars');
    const $trti = document.getElementById('typing-r-time');

    function buildTyping() {
      twords=genWords(120); $twi.innerHTML=''; twEls=[]; tlEls=[];
      twords.forEach(w=>{
        const we=document.createElement('span'); we.className='typing-word';
        const ls=[];
        for(const ch of w){
          const le=document.createElement('span'); le.className='typing-letter'; le.textContent=ch;
          we.appendChild(le); ls.push(le);
        }
        $twi.appendChild(we); $twi.appendChild(document.createTextNode('\u00a0'));
        twEls.push(we); tlEls.push(ls);
      });
    }

    function extendTyping() {
      genWords(50).forEach(w=>{
        twords.push(w);
        const we=document.createElement('span'); we.className='typing-word';
        const ls=[];
        for(const ch of w){
          const le=document.createElement('span'); le.className='typing-letter'; le.textContent=ch;
          we.appendChild(le); ls.push(le);
        }
        $twi.appendChild(we); $twi.appendChild(document.createTextNode('\u00a0'));
        twEls.push(we); tlEls.push(ls);
      });
    }

    function clrCur() { document.querySelectorAll('.cur,.cur-end').forEach(e=>e.classList.remove('cur','cur-end')); }
    function putCur() {
      clrCur(); if(tdone) return;
      const ls=tlEls[tcw]; if(!ls) return;
      if(tcl<ls.length) ls[tcl].classList.add('cur');
      else ls[ls.length-1].classList.add('cur-end');
    }

    const RH = 2.75*16;
    function scrollTyping() {
      if(!twEls[tcw]) return;
      const row=Math.floor(twEls[tcw].offsetTop/RH);
      if(row>1&&row!==tlastRow){ tlastRow=row; $twi.style.transform=`translateY(-${(row-1)*RH}px)`; }
    }

    function startTimer() {
      if(tstarted) return; tstarted=true; tt0=Date.now();
      ttick=setInterval(()=>{
        ttLeft=DUR-Math.floor((Date.now()-tt0)/1000);
        $tlt.textContent=Math.max(0,ttLeft);
        $tlt.classList.toggle('urgent',ttLeft<=5);
        liveStat();
        if(ttLeft<=0) endTest();
      },100);
    }

    function liveStat() {
      if(!tt0) return;
      const m=(Date.now()-tt0)/60000;
      $tlw.textContent=m>0?Math.round(ttotC/5/m):0;
      $tla.textContent=(ttotT>0?Math.round(ttotC/ttotT*100):100)+'%';
    }

    function onTypingKey(e) {
      if(e.ctrlKey && e.key === 'e') {
        e.preventDefault();
        closeTypingTest();
        return;
      }
      
      if(e.key==='Tab'){
        e.preventDefault();
        tidx=(tidx+1)%TIMES.length; DUR=TIMES[tidx];
        $tmt.textContent=DUR; resetTyping(); return;
      }
      if(e.key==='Escape'){
        closeTypingTest();
        return;
      }
      if(tdone) return;

      const skip=['Shift','Control','Alt','Meta','CapsLock',
        'ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
      if(skip.includes(e.key)||e.key.startsWith('F')) return;

      const word=twords[tcw];

      if(e.key==='Backspace'){
        if(ttyped.length>0){
          ttyped=ttyped.slice(0,-1); tcl=Math.min(ttyped.length,word.length);
          renderWord(tcw,ttyped); putCur();
        } else if(tcw>0&&twEls[tcw-1].classList.contains('err')){
          tcw--; ttyped=''; tcl=0; renderWord(tcw,ttyped); putCur(); scrollTyping();
        }
        return;
      }

      if(e.key===' '){
        e.preventDefault(); if(!ttyped.length) return;
        let c=0;
        for(let i=0;i<Math.min(word.length,ttyped.length);i++) if(ttyped[i]===word[i]) c++;
        ttotC+=c+1; ttotT+=ttyped.length+1;
        if(ttyped!==word) twEls[tcw].classList.add('err');
        tcw++; ttyped=''; tcl=0;
        if(tcw>=twords.length-20) extendTyping();
        renderWord(tcw,''); putCur(); scrollTyping(); return;
      }

      if(e.key.length!==1) return;
      if(!tstarted) startTimer();
      if(ttyped.length<word.length+10){
        const i=ttyped.length; ttyped+=e.key; ttotT++;
        if(i<word.length&&e.key===word[i]) ttotC++;
        tcl=Math.min(ttyped.length,word.length);
        renderWord(tcw,ttyped); putCur();
      }
    }

    function renderWord(wi,t) {
      const ls=tlEls[wi],word=twords[wi]; if(!ls) return;
      ls.forEach((el,i)=>{
        el.classList.remove('correct','wrong','cur','cur-end');
        if(i<t.length) el.classList.add(t[i]===word[i]?'correct':'wrong');
      });
      twEls[wi].classList.remove('err');
    }

    function endTest() {
      clearInterval(ttick); tdone=true; clrCur();
      const el=(Date.now()-tt0)/1000, m=el/60;
      const wpm=Math.round(ttotC/5/m), raw=Math.round(ttotT/5/m);
      const acc=ttotT>0?Math.round(ttotC/ttotT*100):100;
      $trw.textContent=wpm; $trr.textContent=raw;
      $tra.textContent=acc+'%';
      $tra.className=acc>=95?'g':acc>=80?'':'r';
      $trc.textContent=`${ttotC}/${ttotT}`; $trti.textContent=Math.round(el)+'s';
      $tw.classList.add('blurred'); $tov.classList.add('show');
    }

    function resetTyping() {
      clearInterval(ttick);
      tstarted=tdone=false; tt0=null; ttLeft=DUR;
      ttotC=ttotT=tcw=tcl=tlastRow=0; ttyped='';
      $twi.style.transform='';
      $tlw.textContent='–'; $tla.textContent='–'; $tlt.textContent=DUR;
      $tlt.classList.remove('urgent');
      $tw.classList.remove('blurred'); $tov.classList.remove('show');
      buildTyping(); putCur(); $tg.focus();
    }

    function openTypingTest() {
      $tm.classList.add('show');
      syncModalToViewport();
      resetTyping();
      setTimeout(()=>$tg.focus(),100);
    }

    function closeTypingTest() {
      $tm.classList.remove('show');
      ['top','left','width','height'].forEach(p => $tm.style.removeProperty(p));
      resetTyping();
      input.focus();
    }

    document.addEventListener('keydown', (e) => {
      if(e.ctrlKey && e.key === 'e') {
        e.preventDefault();
        if($tm.classList.contains('show')) {
          closeTypingTest();
        } else {
          openTypingTest();
        }
        return;
      }

      if($tm.classList.contains('show')) {
        onTypingKey(e);
      }
    });

    $tw.addEventListener('click',()=>$tg.focus());
    $tg.addEventListener('blur',()=>{ if(!tdone) $tw.classList.add('blurred'); });
    $tg.addEventListener('focus',()=>{ if(!tdone) $tw.classList.remove('blurred'); });
    document.getElementById('typing-r-again').addEventListener('click',resetTyping);
    document.getElementById('typing-close').addEventListener('click',closeTypingTest);
    document.getElementById('typing-r-close').addEventListener('click',closeTypingTest);

    // Keep typing modal centered within the visual viewport (e.g. when mobile keyboard appears)
    function syncModalToViewport() {
      if (!window.visualViewport) return;
      const vv = window.visualViewport;
      $tm.style.top    = vv.offsetTop  + 'px';
      $tm.style.left   = vv.offsetLeft + 'px';
      $tm.style.width  = vv.width  + 'px';
      $tm.style.height = vv.height + 'px';
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => { if ($tm.classList.contains('show')) syncModalToViewport(); });
      window.visualViewport.addEventListener('scroll', () => { if ($tm.classList.contains('show')) syncModalToViewport(); });
    }
  </script>
</body>
</html>
