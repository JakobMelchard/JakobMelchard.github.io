<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jakob Melchard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0a0a;
      --bg-dark:      #000000;
      --surface:      rgba(0, 0, 0, 0.4);
      --surface-hover: rgba(0, 0, 0, 0.6);
      --border:       rgba(100, 100, 100, 0.15);
      --border-hover: rgba(139, 233, 253, 0.3);
      --text:         #e0e0e0;
      --muted:        #6272a4;
      --cyan:         #8be9fd;
      --purple:       #bd93f9;
      --pink:         #ff79c6;
      --selected:     rgba(139, 233, 253, 0.08);
    }

    body {
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Monaco', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(139, 233, 253, 0.03) 0%, transparent 50%);
      animation: rotate 30s linear infinite;
      pointer-events: none;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: .2em;
      text-transform: uppercase;
      z-index: 1;
    }

    #search-input {
      width: 480px;
      max-width: 90vw;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: all .3s ease;
      z-index: 1;
    }

    #search-input:focus {
      border-color: var(--border-hover);
      background: rgba(0, 0, 0, 0.5);
    }

    #search-input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      width: 480px;
      max-width: 90vw;
      height: 280px;
      z-index: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(139, 233, 253, 0.3) transparent;
    }

    #results::-webkit-scrollbar {
      width: 6px;
    }

    #results::-webkit-scrollbar-track {
      background: transparent;
    }

    #results::-webkit-scrollbar-thumb {
      background: rgba(139, 233, 253, 0.3);
      border-radius: 3px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .75rem 1rem;
      text-decoration: none;
      color: var(--text);
      font-size: .9rem;
      cursor: pointer;
      transition: all .2s ease;
      flex-shrink: 0;
    }

    .item:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .item.selected {
      background: var(--selected);
      border-color: var(--cyan);
    }

    .item .label {
      font-weight: 500;
      color: var(--text);
    }

    .item .desc {
      font-size: .75rem;
      color: var(--muted);
    }

    .item[data-color="pink"] .label   { color: var(--pink); }
    .item[data-color="purple"] .label { color: var(--purple); }
    .item[data-color="cyan"] .label   { color: var(--cyan); }
    .item[data-color="green"] .label  { color: #50fa7b; }

    .match {
      color: var(--cyan);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Jakob Melchard</h1>
  <input type="text" id="search-input" placeholder="Type to search..." autocomplete="off" autofocus>
  <div id="results"></div>

  <script>
    const items = [
      { key: 'cv',      desc: 'Curriculum Vitae', url: '/cv',                               color: 'pink'   },
      { key: 'github',  desc: 'GitHub Profile',   url: 'https://github.com/JakobMelchard',  color: 'purple' },
      { key: 'contact', desc: 'Email',             url: 'mailto:jakob@melchard.org',         color: 'green'  },
      { key: 'sh',      desc: 'Shell',             url: '/sh',                               color: 'cyan'   },
      { key: 'health',  desc: 'Status',            url: '/health',                           color: 'purple' },
    ];

    let filtered = items;
    let selectedIdx = 0;

    const input   = document.getElementById('search-input');
    const results = document.getElementById('results');

    function fuzzyMatch(str, query) {
      let i = 0, j = 0;
      str   = str.toLowerCase();
      query = query.toLowerCase();
      while (i < str.length && j < query.length) {
        if (str[i] === query[j]) j++;
        i++;
      }
      return j === query.length;
    }

    function highlightMatches(str, query) {
      if (!query) return str;
      let result = '';
      let qi = 0;
      query = query.toLowerCase();
      for (let i = 0; i < str.length; i++) {
        if (qi < query.length && str[i].toLowerCase() === query[qi]) {
          result += `<span class="match">${str[i]}</span>`;
          qi++;
        } else {
          result += str[i];
        }
      }
      return result;
    }

    function openItem(item) {
      if (item.url.startsWith('mailto:')) {
        // Temporary anchor click is the most reliable cross-browser mailto trigger
        const a = document.createElement('a');
        a.href = item.url;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } else {
        window.location.href = item.url;
      }
    }

    function render() {
      results.innerHTML = filtered.map((item, idx) => {
        const sel      = idx === selectedIdx ? ' selected' : '';
        const keyHtml  = highlightMatches(item.key,  input.value);
        const descHtml = highlightMatches(item.desc, input.value);
        return `<a href="${item.url}" class="item${sel}" data-idx="${idx}" data-color="${item.color}">
          <span class="label">${keyHtml}</span>
          <span class="desc">${descHtml}</span>
        </a>`;
      }).join('');

      document.querySelectorAll('.item').forEach(el => {
        // mousedown fires before blur — preventDefault keeps focus on the input
        el.addEventListener('mousedown', (e) => e.preventDefault());

        el.addEventListener('click', (e) => {
          e.preventDefault();
          selectedIdx = parseInt(el.dataset.idx);
          render();
          openItem(filtered[selectedIdx]);
        });
      });
    }

    function filter() {
      const query = input.value.trim();
      filtered    = query
        ? items.filter(item => fuzzyMatch(item.key, query) || fuzzyMatch(item.desc, query))
        : items;
      selectedIdx = 0;
      render();
    }

    input.addEventListener('input', filter);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (filtered.length > 0) openItem(filtered[selectedIdx]);
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIdx = Math.min(filtered.length - 1, selectedIdx + 1);
        render();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIdx = Math.max(0, selectedIdx - 1);
        render();
      }
    });

    render();
  </script>
</body>
</html>
